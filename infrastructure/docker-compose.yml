services:
  db:
    image: pgvector/pgvector:pg16
    container_name: icf_postgres
    environment:
      POSTGRES_USER: icf
      POSTGRES_PASSWORD: icf
      POSTGRES_DB: icf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icf -d icf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: icf_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
